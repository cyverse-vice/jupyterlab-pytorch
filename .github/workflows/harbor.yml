name: harbor

on:
  push:
    branches: main
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      runner:
        description: 'Runner to use (ubuntu-latest, ubuntu-latest-8-cores, etc.)'
        required: false
        default: 'ubuntu-latest-8-cores'

jobs:

  build:
    runs-on: ${{ inputs.runner || 'ubuntu-latest-8-cores' }}
    timeout-minutes: 120

    steps:

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: harbor.cyverse.org
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest
        id: docker_build_latest
        uses: docker/build-push-action@v6
        with:
          context: latest
          file: latest/Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: harbor.cyverse.org/vice/jupyter/pytorch:${{ inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build_latest.outputs.digest }}
